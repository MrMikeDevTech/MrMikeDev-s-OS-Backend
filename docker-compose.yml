version: '3.8'

services:
  backend:
    build: .
    container_name: mrmikedevs_os_backend
    ports:
      - "15800:15800"
    restart: always
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=postgres
      - DB_PASSWORD=postgres
      - DB_NAME=mrmikedevs
    depends_on:
      - db

  db:
    image: postgres:15-alpine
    container_name: mrmikedevs_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mrmikedevs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
